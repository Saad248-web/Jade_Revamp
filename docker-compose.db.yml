# Local PostgreSQL — fresh DB via: npm run db:reset
# Requires Docker Desktop: https://www.docker.com/products/docker-desktop/
# Matches .env.local (POSTGRES_*). schema.sql runs automatically on first start.

services:
  db:
    image: postgres:16-alpine
    container_name: jade-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jadeuser
      POSTGRES_PASSWORD: jade_local_dev_2026
      POSTGRES_DB: jadehost
    volumes:
      - jade_pg_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jadeuser -d jadehost"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jade_pg_data:
